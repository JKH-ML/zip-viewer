<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZIP Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
    }

    header {
      padding: 20px 32px;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      position: sticky;
      top: 0;
      background: #0f0f0f;
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
    }

    #home-btn {
      display: none;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      background: transparent;
      color: #888;
      border: 1px solid #333;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }

    #home-btn:hover { border-color: #555; color: #ccc; }
    #home-btn.visible { display: flex; }

    #download-all-btn {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 8px 18px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    #download-all-btn:hover { background: #1d4ed8; }
    #download-all-btn.visible { display: flex; }

    /* Drop zone */
    #drop-zone {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin: 60px auto;
      max-width: 560px;
      padding: 40px 24px;
      border: 2px dashed #333;
      border-radius: 16px;
      transition: border-color 0.15s, background 0.15s;
      position: relative;
    }

    #drop-zone.dragover {
      border-color: #2563eb;
      background: rgba(37, 99, 235, 0.06);
    }

    #drop-zone svg { opacity: 0.4; }

    #drop-zone p {
      font-size: 15px;
      color: #888;
    }

    #drop-zone span {
      font-size: 13px;
      color: #555;
    }

    .drop-zone-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 8px;
    }

    .dz-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 9px 20px;
      border-radius: 9px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
    }

    .dz-btn-primary {
      background: #2563eb;
      color: #fff;
      border: none;
    }
    .dz-btn-primary:hover { background: #1d4ed8; }

    .dz-btn-secondary {
      background: transparent;
      color: #aaa;
      border: 1px solid #333;
    }
    .dz-btn-secondary:hover { border-color: #555; color: #ccc; }

    #file-input {
      position: absolute;
      width: 0;
      height: 0;
      opacity: 0;
      pointer-events: none;
    }

    /* ZIP list (folder mode) */
    #zip-list-section {
      display: none;
      padding: 32px;
      max-width: 800px;
      margin: 0 auto;
    }

    #zip-list-section.visible { display: block; }

    .zip-list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .zip-list-header h2 {
      font-size: 16px;
      font-weight: 600;
      color: #ccc;
    }

    .zip-list-header span {
      font-size: 13px;
      color: #555;
    }

    #zip-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .zip-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      background: #1a1a1a;
      border: 1px solid #252525;
      border-radius: 10px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .zip-item:hover { border-color: #444; background: #1f1f1f; }

    .zip-item-icon {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      background: #252525;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #2563eb;
    }

    .zip-item-info {
      flex: 1;
      min-width: 0;
    }

    .zip-item-name {
      font-size: 14px;
      color: #ddd;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .zip-item-size {
      font-size: 12px;
      color: #555;
      margin-top: 3px;
    }

    .zip-item-arrow {
      flex-shrink: 0;
      color: #444;
    }

    /* Stats bar */
    #stats-bar {
      display: none;
      align-items: center;
      gap: 16px;
      padding: 12px 32px;
      background: #161616;
      border-bottom: 1px solid #222;
      font-size: 13px;
      color: #888;
      flex-wrap: wrap;
    }

    #stats-bar.visible { display: flex; }
    #stats-bar strong { color: #ccc; }

    #filter-bar {
      display: none;
      gap: 8px;
      padding: 14px 32px;
      border-bottom: 1px solid #1a1a1a;
      flex-wrap: wrap;
    }

    #filter-bar.visible { display: flex; }

    .filter-btn {
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid #333;
      background: transparent;
      color: #888;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover { border-color: #555; color: #ccc; }
    .filter-btn.active { background: #2563eb; border-color: #2563eb; color: #fff; }

    /* Gallery */
    #gallery {
      padding: 24px 32px;
      columns: 4 200px;
      column-gap: 14px;
    }

    .media-card {
      break-inside: avoid;
      margin-bottom: 14px;
      background: #1a1a1a;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #252525;
      transition: border-color 0.15s;
    }

    .media-card:hover { border-color: #444; }

    .media-card .thumb {
      width: 100%;
      display: block;
      cursor: pointer;
    }

    .media-card img.thumb {
      object-fit: cover;
      max-height: 340px;
    }

    .media-card video.thumb {
      max-height: 280px;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 10px;
    }

    .file-name {
      font-size: 12px;
      color: #777;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .dl-btn {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: #252525;
      border: 1px solid #333;
      color: #aaa;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .dl-btn:hover { background: #2563eb; color: #fff; border-color: #2563eb; }

    /* Lightbox */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 999;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(6px);
    }

    #lightbox.open { display: flex; }

    #lightbox-inner {
      position: relative;
      max-width: 90vw;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    #lightbox-content {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #lightbox-inner img,
    #lightbox-inner video {
      max-width: 92vw;
      max-height: 88vh;
      border-radius: 8px;
      object-fit: contain;
    }

    #lightbox-close {
      position: absolute;
      top: -44px;
      right: 0;
      background: none;
      border: none;
      color: #aaa;
      font-size: 30px;
      cursor: pointer;
      line-height: 1;
      padding: 4px;
    }

    #lightbox-close:hover { color: #fff; }

    .lb-arrow {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      color: #ccc;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      z-index: 1000;
      user-select: none;
    }

    .lb-arrow:hover { background: rgba(255,255,255,0.18); color: #fff; }
    .lb-arrow:disabled { opacity: 0.2; cursor: default; pointer-events: none; }

    #lb-prev { left: 20px; }
    #lb-next { right: 20px; }

    #lightbox-footer {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    #lb-save-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 16px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    #lb-save-btn:hover { background: #1d4ed8; }

    #lightbox-counter {
      font-size: 12px;
      color: #555;
      white-space: nowrap;
    }

    #lightbox-name {
      font-size: 13px;
      color: #888;
      max-width: 70vw;
      text-align: center;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Loading */
    #loading {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 80px 32px;
    }

    #loading.visible { display: flex; }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #333;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #loading p { font-size: 14px; color: #666; }

    /* Error */
    #error-msg {
      display: none;
      margin: 40px auto;
      max-width: 420px;
      padding: 16px 20px;
      background: #1e1010;
      border: 1px solid #5c2020;
      border-radius: 10px;
      font-size: 14px;
      color: #f87171;
      text-align: center;
    }

    #error-msg.visible { display: block; }

    /* No support notice */
    #no-support-msg {
      display: none;
      margin: 40px auto;
      max-width: 460px;
      padding: 16px 20px;
      background: #141a10;
      border: 1px solid #2d4a1e;
      border-radius: 10px;
      font-size: 14px;
      color: #86efac;
      text-align: center;
      line-height: 1.6;
    }

    #no-support-msg.visible { display: block; }

    @media (max-width: 600px) {
      #gallery { columns: 2 150px; padding: 16px; }
      header { padding: 14px 16px; }
      #stats-bar, #filter-bar { padding: 10px 16px; }
      #lb-prev { left: 8px; }
      #lb-next { right: 8px; }
      .lb-arrow { width: 38px; height: 38px; }
      #lightbox-inner img, #lightbox-inner video { max-width: 86vw; max-height: 80vh; }
      #zip-list-section { padding: 20px 16px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>ZIP Viewer</h1>
    <button id="home-btn" onclick="goHome()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9.5z"/>
        <polyline points="9 21 9 12 15 12 15 21"/>
      </svg>
      새 ZIP 열기
    </button>
  </div>
  <button id="download-all-btn" onclick="downloadAll()">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/>
      <line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
    전체 다운로드
  </button>
</header>

<div id="drop-zone">
  <input type="file" id="file-input" accept=".zip" />
  <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
    <polyline points="17 8 12 3 7 8"/>
    <line x1="12" y1="3" x2="12" y2="15"/>
  </svg>
  <p>ZIP 파일을 여기에 드래그하거나 아래 버튼으로 선택</p>
  <div class="drop-zone-actions">
    <button class="dz-btn dz-btn-primary" onclick="document.getElementById('file-input').click()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      ZIP 파일 선택
    </button>
    <button class="dz-btn dz-btn-secondary" id="open-folder-btn" onclick="openFolder()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
      </svg>
      폴더 열기
    </button>
  </div>
  <span>이미지 및 동영상 파일을 자동으로 표시합니다</span>
</div>

<div id="no-support-msg">
  이 브라우저는 폴더 열기를 지원하지 않습니다.<br>
  Chrome 또는 Edge 최신 버전을 사용해 주세요.
</div>

<div id="zip-list-section">
  <div class="zip-list-header">
    <h2 id="zip-list-title">폴더의 ZIP 파일</h2>
    <span id="zip-list-count"></span>
  </div>
  <div id="zip-list"></div>
</div>

<div id="loading">
  <div class="spinner"></div>
  <p id="loading-text">ZIP 파일 분석 중...</p>
</div>

<div id="error-msg"></div>

<div id="stats-bar">
  <span>파일명: <strong id="stat-zip-name"></strong></span>
  <span>이미지: <strong id="stat-images">0</strong>개</span>
  <span>동영상: <strong id="stat-videos">0</strong>개</span>
  <span>총 크기: <strong id="stat-size"></strong></span>
</div>

<div id="filter-bar">
  <button class="filter-btn active" data-filter="all" onclick="applyFilter(this)">전체</button>
  <button class="filter-btn" data-filter="image" onclick="applyFilter(this)">이미지</button>
  <button class="filter-btn" data-filter="video" onclick="applyFilter(this)">동영상</button>
</div>

<div id="gallery"></div>

<!-- Lightbox -->
<div id="lightbox" onclick="onLightboxBgClick(event)">
  <button class="lb-arrow" id="lb-prev" onclick="lbNavigate(-1)">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <div id="lightbox-inner">
    <button id="lightbox-close" onclick="closeLightbox()">&#215;</button>
    <div id="lightbox-content"></div>
    <div id="lightbox-footer">
      <span id="lightbox-counter"></span>
      <div id="lightbox-name"></div>
      <button id="lb-save-btn" onclick="lbSaveCurrent()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        저장
      </button>
    </div>
  </div>
  <button class="lb-arrow" id="lb-next" onclick="lbNavigate(1)">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
  </button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
  const IMAGE_EXTS = new Set(['jpg','jpeg','png','gif','webp','bmp','svg','avif','tiff','tif','ico']);
  const VIDEO_EXTS = new Set(['mp4','webm','ogg','mov','mkv','avi','m4v','3gp','flv']);

  let allFiles = [];
  let currentFilter = 'all';
  let lbIndex = -1;

  // folder mode state
  let folderZipHandles = []; // FileSystemFileHandle[]
  let currentMode = 'single'; // 'single' | 'folder'

  function getExt(name) { return name.split('.').pop().toLowerCase(); }
  function isImage(name) { return IMAGE_EXTS.has(getExt(name)); }
  function isVideo(name) { return VIDEO_EXTS.has(getExt(name)); }

  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  }

  function filteredFiles() {
    return currentFilter === 'all' ? allFiles : allFiles.filter(f => f.type === currentFilter);
  }

  // Drop zone
  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file) processZip(file);
  });
  fileInput.addEventListener('change', e => { if (e.target.files[0]) processZip(e.target.files[0]); });

  // Folder open via File System Access API
  async function openFolder() {
    if (!window.showDirectoryPicker) {
      document.getElementById('no-support-msg').classList.add('visible');
      return;
    }
    let dirHandle;
    try {
      dirHandle = await window.showDirectoryPicker({ mode: 'read' });
    } catch (e) {
      // user cancelled
      return;
    }

    const zipHandles = [];
    for await (const [name, handle] of dirHandle.entries()) {
      if (handle.kind === 'file' && name.toLowerCase().endsWith('.zip')) {
        zipHandles.push(handle);
      }
    }

    zipHandles.sort((a, b) => a.name.localeCompare(b.name));

    if (zipHandles.length === 0) {
      document.getElementById('no-support-msg').classList.remove('visible');
      showError('폴더 안에 ZIP 파일이 없습니다.');
      return;
    }

    folderZipHandles = zipHandles;
    currentMode = 'folder';
    showZipList(dirHandle.name, zipHandles);
  }

  async function showZipList(folderName, handles) {
    document.getElementById('drop-zone').style.display = 'none';
    document.getElementById('no-support-msg').classList.remove('visible');
    document.getElementById('error-msg').classList.remove('visible');
    document.getElementById('gallery').innerHTML = '';
    document.getElementById('stats-bar').classList.remove('visible');
    document.getElementById('filter-bar').classList.remove('visible');
    document.getElementById('download-all-btn').classList.remove('visible');
    document.getElementById('home-btn').classList.add('visible');

    document.getElementById('zip-list-title').textContent = folderName + ' 폴더의 ZIP 파일';
    document.getElementById('zip-list-count').textContent = handles.length + '개';

    const listEl = document.getElementById('zip-list');
    listEl.innerHTML = '';

    for (const handle of handles) {
      const file = await handle.getFile();
      const item = document.createElement('div');
      item.className = 'zip-item';
      item.innerHTML = `
        <div class="zip-item-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
        </div>
        <div class="zip-item-info">
          <div class="zip-item-name">${handle.name}</div>
          <div class="zip-item-size">${formatSize(file.size)}</div>
        </div>
        <div class="zip-item-arrow">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
      `;
      item.addEventListener('click', async () => {
        const f = await handle.getFile();
        processZip(f, true);
      });
      listEl.appendChild(item);
    }

    document.getElementById('zip-list-section').classList.add('visible');
  }

  function setLoading(text) {
    document.getElementById('loading-text').textContent = text || 'ZIP 파일 분석 중...';
    document.getElementById('loading').classList.add('visible');
    document.getElementById('drop-zone').style.display = 'none';
    document.getElementById('zip-list-section').classList.remove('visible');
    document.getElementById('gallery').innerHTML = '';
    document.getElementById('stats-bar').classList.remove('visible');
    document.getElementById('filter-bar').classList.remove('visible');
    document.getElementById('download-all-btn').classList.remove('visible');
    document.getElementById('error-msg').classList.remove('visible');
  }

  function hideLoading() { document.getElementById('loading').classList.remove('visible'); }

  function showError(msg) {
    hideLoading();
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.classList.add('visible');
    document.getElementById('drop-zone').style.display = 'flex';
  }

  function goHome() {
    allFiles.forEach(f => URL.revokeObjectURL(f.url));
    allFiles = [];
    currentFilter = 'all';
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === 'all'));
    document.getElementById('gallery').innerHTML = '';
    document.getElementById('stats-bar').classList.remove('visible');
    document.getElementById('filter-bar').classList.remove('visible');
    document.getElementById('download-all-btn').classList.remove('visible');
    document.getElementById('error-msg').classList.remove('visible');
    document.getElementById('no-support-msg').classList.remove('visible');

    if (currentMode === 'folder' && folderZipHandles.length > 0) {
      // go back to zip list
      const titleEl = document.getElementById('zip-list-title');
      document.getElementById('zip-list-section').classList.add('visible');
      document.getElementById('drop-zone').style.display = 'none';
    } else {
      currentMode = 'single';
      folderZipHandles = [];
      document.getElementById('zip-list-section').classList.remove('visible');
      document.getElementById('home-btn').classList.remove('visible');
      document.getElementById('drop-zone').style.display = 'flex';
      fileInput.value = '';
    }
  }

  async function processZip(file, fromFolder = false) {
    if (!file.name.toLowerCase().endsWith('.zip')) { showError('ZIP 파일만 지원합니다.'); return; }
    setLoading('ZIP 파일 열기...');
    allFiles.forEach(f => URL.revokeObjectURL(f.url));
    allFiles = [];

    if (fromFolder) {
      document.getElementById('home-btn').classList.add('visible');
    }

    try {
      const zip = await JSZip.loadAsync(file);
      const entries = [];
      zip.forEach((path, entry) => {
        if (entry.dir) return;
        const name = path.split('/').pop();
        if (isImage(name) || isVideo(name)) entries.push({ path, entry, name });
      });

      if (entries.length === 0) { showError('ZIP 파일 안에 지원하는 이미지 또는 동영상 파일이 없습니다.'); return; }

      document.getElementById('loading-text').textContent = `파일 처리 중... (0 / ${entries.length})`;

      for (let i = 0; i < entries.length; i++) {
        const { entry, name } = entries[i];
        document.getElementById('loading-text').textContent = `파일 처리 중... (${i + 1} / ${entries.length})`;
        const blob = await entry.async('blob');
        const mimeBlob = fixMime(blob, name);
        const url = URL.createObjectURL(mimeBlob);
        allFiles.push({ name, type: isImage(name) ? 'image' : 'video', blob: mimeBlob, url, size: blob.size });
      }

      hideLoading();
      renderStats(file.name, fromFolder);
      renderGallery();
    } catch (err) {
      showError('ZIP 파일을 읽는 중 오류가 발생했습니다: ' + err.message);
    }
  }

  function fixMime(blob, name) {
    const ext = getExt(name);
    const mimeMap = {
      jpg:'image/jpeg',jpeg:'image/jpeg',png:'image/png',gif:'image/gif',
      webp:'image/webp',bmp:'image/bmp',svg:'image/svg+xml',avif:'image/avif',
      tiff:'image/tiff',tif:'image/tiff',ico:'image/x-icon',
      mp4:'video/mp4',webm:'video/webm',ogg:'video/ogg',mov:'video/quicktime',
      mkv:'video/x-matroska',avi:'video/x-msvideo',m4v:'video/mp4',
      '3gp':'video/3gpp',flv:'video/x-flv',
    };
    const mime = mimeMap[ext];
    return mime ? blob.slice(0, blob.size, mime) : blob;
  }

  function renderStats(zipName, fromFolder) {
    document.getElementById('stat-zip-name').textContent = zipName;
    document.getElementById('stat-images').textContent = allFiles.filter(f => f.type === 'image').length;
    document.getElementById('stat-videos').textContent = allFiles.filter(f => f.type === 'video').length;
    document.getElementById('stat-size').textContent = formatSize(allFiles.reduce((s, f) => s + f.size, 0));
    document.getElementById('stats-bar').classList.add('visible');
    document.getElementById('filter-bar').classList.add('visible');
    document.getElementById('download-all-btn').classList.add('visible');
    document.getElementById('home-btn').classList.add('visible');
    document.getElementById('drop-zone').style.display = 'none';
    document.getElementById('zip-list-section').classList.remove('visible');
  }

  function renderGallery() {
    const gallery = document.getElementById('gallery');
    gallery.innerHTML = '';
    const files = filteredFiles();

    files.forEach((file, idx) => {
      const card = document.createElement('div');
      card.className = 'media-card';
      card.dataset.type = file.type;

      let mediaEl;
      if (file.type === 'image') {
        mediaEl = document.createElement('img');
        mediaEl.src = file.url;
        mediaEl.alt = file.name;
        mediaEl.loading = 'lazy';
      } else {
        mediaEl = document.createElement('video');
        mediaEl.src = file.url;
        mediaEl.controls = true;
        mediaEl.preload = 'metadata';
      }
      mediaEl.className = 'thumb';
      mediaEl.onclick = () => openLightbox(idx);

      const footer = document.createElement('div');
      footer.className = 'card-footer';

      const nameEl = document.createElement('div');
      nameEl.className = 'file-name';
      nameEl.title = file.name;
      nameEl.textContent = file.name;

      const dlBtn = document.createElement('button');
      dlBtn.className = 'dl-btn';
      dlBtn.title = '다운로드';
      dlBtn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`;
      dlBtn.onclick = e => { e.stopPropagation(); downloadFile(file); };

      footer.appendChild(nameEl);
      footer.appendChild(dlBtn);
      card.appendChild(mediaEl);
      card.appendChild(footer);
      gallery.appendChild(card);
    });
  }

  function applyFilter(btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderGallery();
  }

  function downloadFile(file) {
    const a = document.createElement('a');
    a.href = file.url;
    a.download = file.name;
    a.click();
  }

  async function downloadAll() {
    const btn = document.getElementById('download-all-btn');
    btn.disabled = true;
    btn.textContent = '압축 중...';
    try {
      const zip = new JSZip();
      allFiles.forEach(f => zip.file(f.name, f.blob));
      const blob = await zip.generateAsync({ type: 'blob', compression: 'STORE' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'media_files.zip';
      a.click();
      URL.revokeObjectURL(url);
    } finally {
      btn.disabled = false;
      btn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> 전체 다운로드`;
    }
  }

  // Lightbox
  function openLightbox(idx) {
    lbIndex = idx;
    renderLightboxItem();
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function renderLightboxItem() {
    const files = filteredFiles();
    const file = files[lbIndex];
    if (!file) return;

    const content = document.getElementById('lightbox-content');
    const prevVideo = content.querySelector('video');
    if (prevVideo) prevVideo.pause();
    content.innerHTML = '';

    let el;
    if (file.type === 'image') {
      el = document.createElement('img');
      el.src = file.url;
      el.alt = file.name;
    } else {
      el = document.createElement('video');
      el.src = file.url;
      el.controls = true;
      el.autoplay = true;
    }
    content.appendChild(el);

    document.getElementById('lightbox-name').textContent = file.name;
    document.getElementById('lightbox-counter').textContent = `${lbIndex + 1} / ${files.length}`;
    document.getElementById('lb-prev').disabled = lbIndex === 0;
    document.getElementById('lb-next').disabled = lbIndex === files.length - 1;
  }

  function lbNavigate(dir) {
    const files = filteredFiles();
    const next = lbIndex + dir;
    if (next < 0 || next >= files.length) return;
    lbIndex = next;
    renderLightboxItem();
  }

  function lbSaveCurrent() {
    const file = filteredFiles()[lbIndex];
    if (file) downloadFile(file);
  }

  function closeLightbox() {
    const video = document.querySelector('#lightbox-content video');
    if (video) video.pause();
    document.getElementById('lightbox').classList.remove('open');
    document.getElementById('lightbox-content').innerHTML = '';
    document.body.style.overflow = '';
    lbIndex = -1;
  }

  function onLightboxBgClick(e) {
    if (e.target === document.getElementById('lightbox')) closeLightbox();
  }

  document.addEventListener('keydown', e => {
    if (!document.getElementById('lightbox').classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') lbNavigate(-1);
    if (e.key === 'ArrowRight') lbNavigate(1);
  });
</script>
</body>
</html>
