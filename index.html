<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZIP Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
    }

    header {
      padding: 20px 32px;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      position: sticky;
      top: 0;
      background: #0f0f0f;
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
    }

    #home-btn {
      display: none;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      background: transparent;
      color: #888;
      border: 1px solid #333;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }

    #home-btn:hover { border-color: #555; color: #ccc; }
    #home-btn.visible { display: flex; }

    #download-all-btn {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 8px 18px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    #download-all-btn:hover { background: #1d4ed8; }
    #download-all-btn.visible { display: flex; }

    #decode-all-btn {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 8px 18px;
      background: #1a2a1a;
      color: #86efac;
      border: 1px solid #2d4a2d;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    #decode-all-btn:hover { background: #1f3a1f; }
    #decode-all-btn.visible { display: flex; }
    #decode-all-btn:disabled { opacity: 0.5; cursor: default; }

    /* Decode-all progress bar */
    #decode-progress {
      display: none;
      align-items: center;
      gap: 12px;
      padding: 10px 32px;
      background: #0f0f0f;
      border-bottom: 1px solid #1a1a1a;
      font-size: 13px;
      color: #86efac;
    }

    #decode-progress.visible { display: flex; }

    #decode-progress-bar-wrap {
      flex: 1;
      height: 4px;
      background: #222;
      border-radius: 2px;
      overflow: hidden;
    }

    #decode-progress-bar {
      height: 100%;
      background: #86efac;
      border-radius: 2px;
      transition: width 0.2s;
      width: 0%;
    }

    /* Drop zone */
    #drop-zone {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin: 60px auto;
      max-width: 560px;
      padding: 40px 24px;
      border: 2px dashed #333;
      border-radius: 16px;
      transition: border-color 0.15s, background 0.15s;
      position: relative;
    }

    #drop-zone.dragover {
      border-color: #2563eb;
      background: rgba(37, 99, 235, 0.06);
    }

    #drop-zone svg { opacity: 0.4; }

    #drop-zone p {
      font-size: 15px;
      color: #888;
    }

    #drop-zone span {
      font-size: 13px;
      color: #555;
    }

    .drop-zone-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 8px;
    }

    .dz-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 9px 20px;
      border-radius: 9px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
    }

    .dz-btn-primary {
      background: #2563eb;
      color: #fff;
      border: none;
    }
    .dz-btn-primary:hover { background: #1d4ed8; }

    .dz-btn-secondary {
      background: transparent;
      color: #aaa;
      border: 1px solid #333;
    }
    .dz-btn-secondary:hover { border-color: #555; color: #ccc; }

    #file-input {
      position: absolute;
      width: 0;
      height: 0;
      opacity: 0;
      pointer-events: none;
    }

    /* Lightbox drop overlay */
    #lb-drop-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(37,99,235,0.18);
      border: 3px dashed #2563eb;
      border-radius: 8px;
      z-index: 2000;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    #lb-drop-overlay.active { display: flex; }

    #lb-drop-overlay span {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      background: rgba(0,0,0,0.6);
      padding: 12px 28px;
      border-radius: 10px;
    }

    /* Stats bar */
    #stats-bar {
      display: none;
      align-items: center;
      gap: 16px;
      padding: 12px 32px;
      background: #161616;
      border-bottom: 1px solid #222;
      font-size: 13px;
      color: #888;
      flex-wrap: wrap;
    }

    #stats-bar.visible { display: flex; }
    #stats-bar strong { color: #ccc; }

    #filter-bar {
      display: none;
      gap: 8px;
      padding: 14px 32px;
      border-bottom: 1px solid #1a1a1a;
      flex-wrap: wrap;
    }

    #filter-bar.visible { display: flex; }

    .filter-btn {
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid #333;
      background: transparent;
      color: #888;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover { border-color: #555; color: #ccc; }
    .filter-btn.active { background: #2563eb; border-color: #2563eb; color: #fff; }

    /* Gallery */
    #gallery {
      padding: 24px 32px;
      columns: 4 200px;
      column-gap: 14px;
    }

    .media-card {
      break-inside: avoid;
      margin-bottom: 14px;
      background: #1a1a1a;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #252525;
      transition: border-color 0.15s;
    }

    .media-card:hover { border-color: #444; }

    .media-card .thumb {
      width: 100%;
      display: block;
      cursor: pointer;
    }

    .media-card img.thumb {
      object-fit: cover;
      max-height: 340px;
    }

    .media-card video.thumb {
      max-height: 280px;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 10px;
    }

    .file-name {
      font-size: 12px;
      color: #777;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .dl-btn {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: #252525;
      border: 1px solid #333;
      color: #aaa;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .dl-btn:hover { background: #2563eb; color: #fff; border-color: #2563eb; }

    /* Lightbox */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 999;
      align-items: stretch;
      backdrop-filter: blur(6px);
    }

    #lightbox.open { display: flex; }

    /* Left: image area */
    #lightbox-image-area {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    #lightbox-content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 0;
      padding: 48px 16px 0;
    }

    #lightbox-image-area img,
    #lightbox-image-area video {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    #lightbox-close {
      position: absolute;
      top: 12px;
      right: 16px;
      background: none;
      border: none;
      color: #aaa;
      font-size: 30px;
      cursor: pointer;
      line-height: 1;
      padding: 4px;
      z-index: 10;
    }

    #lightbox-close:hover { color: #fff; }

    .lb-arrow {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      color: #ccc;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      z-index: 1000;
      user-select: none;
    }

    .lb-arrow:hover { background: rgba(255,255,255,0.18); color: #fff; }
    .lb-arrow:disabled { opacity: 0.2; cursor: default; pointer-events: none; }

    #lb-prev { left: 20px; }
    #lb-next { right: 20px; }

    #lightbox-footer {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      flex-shrink: 0;
    }

    #lb-save-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 16px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    #lb-save-btn:hover { background: #1d4ed8; }

    #lightbox-counter {
      font-size: 12px;
      color: #555;
      white-space: nowrap;
    }

    #lightbox-name {
      flex: 1;
      font-size: 13px;
      color: #888;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Right: ComfyUI metadata sidebar */
    #comfy-panel {
      display: none;
      width: 340px;
      flex-shrink: 0;
      flex-direction: column;
      background: #111;
      border-left: 1px solid #222;
      overflow-y: auto;
    }

    #comfy-panel.visible { display: flex; }

    #comfy-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 10px;
      border-bottom: 1px solid #1e1e1e;
      flex-shrink: 0;
    }

    #comfy-panel-title {
      font-size: 12px;
      font-weight: 600;
      color: #aaa;
      letter-spacing: 0.04em;
    }

    #comfy-panel-close {
      background: none;
      border: none;
      color: #555;
      font-size: 18px;
      cursor: pointer;
      line-height: 1;
      padding: 2px 4px;
    }

    #comfy-panel-close:hover { color: #ccc; }

    #comfy-panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 14px 16px;
    }

    .comfy-section {
      margin-bottom: 16px;
    }

    .comfy-section:last-child { margin-bottom: 0; }

    .comfy-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #2563eb;
      margin-bottom: 5px;
    }

    .comfy-value {
      font-size: 12px;
      color: #bbb;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.55;
      background: #1a1a1a;
      border: 1px solid #252525;
      border-radius: 6px;
      padding: 8px 10px;
      max-height: 140px;
      overflow-y: auto;
    }

    .comfy-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .comfy-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 9px;
      background: #1e2a1e;
      border: 1px solid #2d4a2d;
      border-radius: 12px;
      font-size: 11px;
      color: #86efac;
    }

    .comfy-chip-key { color: #555; }

    #comfy-toggle {
      display: none;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      background: transparent;
      color: #2563eb;
      border: 1px solid #1e3a6e;
      border-radius: 7px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    #comfy-toggle:hover { background: rgba(37,99,235,0.12); }
    #comfy-toggle.visible { display: flex; }

    @media (max-width: 700px) {
      #comfy-panel, #snail-panel { width: 100%; border-left: none; border-top: 1px solid #222; max-height: 40vh; }
      #lightbox.open { flex-direction: column; }
    }

    /* Loading */
    #loading {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 80px 32px;
    }

    #loading.visible { display: flex; }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #333;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #loading p { font-size: 14px; color: #666; }

    /* Error */
    #error-msg {
      display: none;
      margin: 40px auto;
      max-width: 420px;
      padding: 16px 20px;
      background: #1e1010;
      border: 1px solid #5c2020;
      border-radius: 10px;
      font-size: 14px;
      color: #f87171;
      text-align: center;
    }

    #error-msg.visible { display: block; }

    /* No support notice */
    #no-support-msg {
      display: none;
      margin: 40px auto;
      max-width: 460px;
      padding: 16px 20px;
      background: #141a10;
      border: 1px solid #2d4a1e;
      border-radius: 10px;
      font-size: 14px;
      color: #86efac;
      text-align: center;
      line-height: 1.6;
    }

    #no-support-msg.visible { display: block; }

    @media (max-width: 600px) {
      #gallery { columns: 2 150px; padding: 16px; }
      header { padding: 14px 16px; }
      #stats-bar, #filter-bar { padding: 10px 16px; }
      #lb-prev { left: 8px; }
      #lb-next { right: 8px; }
      .lb-arrow { width: 38px; height: 38px; }
    }

    /* Snail badge on gallery card */
    .media-card { position: relative; }

    .snail-badge {
      position: absolute;
      top: 7px;
      right: 7px;
      background: rgba(0,0,0,0.72);
      border: 1px solid #2d4a2d;
      border-radius: 6px;
      padding: 2px 7px;
      font-size: 11px;
      color: #86efac;
      pointer-events: none;
      z-index: 2;
    }

    /* Snail decode panel */
    #snail-panel {
      display: none;
      width: 340px;
      flex-shrink: 0;
      flex-direction: column;
      background: #111;
      border-left: 1px solid #222;
      overflow-y: auto;
    }

    #snail-panel.visible { display: flex; }

    #snail-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 10px;
      border-bottom: 1px solid #1e1e1e;
      flex-shrink: 0;
    }

    #snail-panel-title {
      font-size: 12px;
      font-weight: 600;
      color: #aaa;
      letter-spacing: 0.04em;
    }

    #snail-panel-close {
      background: none;
      border: none;
      color: #555;
      font-size: 18px;
      cursor: pointer;
      line-height: 1;
      padding: 2px 4px;
    }

    #snail-panel-close:hover { color: #ccc; }

    #snail-panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .snail-pw-row {
      display: flex;
      gap: 8px;
    }

    .snail-pw-input {
      flex: 1;
      padding: 7px 10px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 7px;
      color: #ccc;
      font-size: 13px;
      outline: none;
    }

    .snail-pw-input:focus { border-color: #2563eb; }

    .snail-decode-btn {
      padding: 7px 14px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }

    .snail-decode-btn:hover { background: #1d4ed8; }
    .snail-decode-btn:disabled { background: #333; color: #666; cursor: default; }

    #snail-status {
      font-size: 12px;
      color: #666;
      min-height: 18px;
    }

    #snail-status.error { color: #f87171; }
    #snail-status.ok { color: #86efac; }

    #snail-result {
      display: none;
      flex-direction: column;
      gap: 8px;
    }

    #snail-result.visible { display: flex; }

    #snail-result img, #snail-result video {
      width: 100%;
      border-radius: 8px;
      border: 1px solid #252525;
    }

    .snail-save-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 7px 0;
      background: #1a2a1a;
      border: 1px solid #2d4a2d;
      border-radius: 7px;
      color: #86efac;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    .snail-save-btn:hover { background: #1f3a1f; }

    .snail-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #86efac;
      margin-bottom: 2px;
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>ZIP Viewer</h1>
    <button id="home-btn" onclick="goHome()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9.5z"/>
        <polyline points="9 21 9 12 15 12 15 21"/>
      </svg>
      Open New ZIP
    </button>
  </div>
  <button id="decode-all-btn" onclick="decodeAll()">
    🐌 Decode All
  </button>
  <button id="download-all-btn" onclick="downloadAll()">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/>
      <line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
    Download All
  </button>
</header>

<div id="decode-progress">
  <span id="decode-progress-text">Decoding…</span>
  <div id="decode-progress-bar-wrap"><div id="decode-progress-bar"></div></div>
</div>

<div id="drop-zone">
  <input type="file" id="file-input" accept=".zip" multiple />
  <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
    <polyline points="17 8 12 3 7 8"/>
    <line x1="12" y1="3" x2="12" y2="15"/>
  </svg>
  <p>Drag ZIP files here or select with the button below</p>
  <div class="drop-zone-actions">
    <button class="dz-btn dz-btn-primary" onclick="document.getElementById('file-input').click()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      Select ZIP Files (multiple)
    </button>
  </div>
  <span>You can drag or select multiple ZIPs at once</span>
</div>

<div id="loading">
  <div class="spinner"></div>
  <p id="loading-text">Analyzing ZIP file...</p>
</div>

<div id="error-msg"></div>

<div id="stats-bar">
  <span>Loaded: <strong id="stat-zip-name"></strong></span>
  <span>Images: <strong id="stat-images">0</strong></span>
  <span>Videos: <strong id="stat-videos">0</strong></span>
  <span>Total size: <strong id="stat-size"></strong></span>
</div>

<div id="filter-bar">
  <button class="filter-btn active" data-filter="all" onclick="applyFilter(this)">All</button>
  <button class="filter-btn" data-filter="image" onclick="applyFilter(this)">Images</button>
  <button class="filter-btn" data-filter="video" onclick="applyFilter(this)">Videos</button>
</div>

<div id="gallery"></div>

<!-- Lightbox -->
<div id="lightbox" onclick="onLightboxBgClick(event)">
  <div id="lb-drop-overlay"><span>Drop ZIP to add</span></div>
  <button class="lb-arrow" id="lb-prev" onclick="lbNavigate(-1)">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <div id="lightbox-image-area">
    <button id="lightbox-close" onclick="closeLightbox()">&#215;</button>
    <div id="lightbox-content"></div>
    <div id="lightbox-footer">
      <span id="lightbox-counter"></span>
      <div id="lightbox-name"></div>
      <button id="comfy-toggle" onclick="toggleComfyPanel()">

  <div id="comfy-panel">
    <div id="comfy-panel-header">

          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>

  </button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
  const IMAGE_EXTS = new Set(['jpg','jpeg','png','gif','webp','bmp','svg','avif','tiff','tif','ico']);
  const VIDEO_EXTS = new Set(['mp4','webm','ogg','mov','mkv','avi','m4v','3gp','flv']);

  // --- ComfyUI PNG metadata extraction ---

  function readUint32BE(buf, offset) {
    return ((buf[offset] << 24) | (buf[offset+1] << 16) | (buf[offset+2] << 8) | buf[offset+3]) >>> 0;
  }

  async function extractPngTextChunks(blob) {
    const buf = new Uint8Array(await blob.arrayBuffer());
    const PNG_SIG = [137,80,78,71,13,10,26,10];
    for (let i = 0; i < 8; i++) if (buf[i] !== PNG_SIG[i]) return null;

    const chunks = {};
    let pos = 8;
    const dec = new TextDecoder('latin1');
    const decUtf8 = new TextDecoder('utf-8');

    while (pos + 12 <= buf.length) {
      const length = readUint32BE(buf, pos);
      const type = dec.decode(buf.slice(pos + 4, pos + 8));
      const data = buf.slice(pos + 8, pos + 8 + length);

      if (type === 'tEXt') {
        const nullIdx = data.indexOf(0);
        if (nullIdx !== -1) {
          const key = dec.decode(data.slice(0, nullIdx));
          const value = dec.decode(data.slice(nullIdx + 1));
          chunks[key] = value;
        }
      } else if (type === 'iTXt') {
        const nullIdx = data.indexOf(0);
        if (nullIdx !== -1) {
          const key = dec.decode(data.slice(0, nullIdx));
          // skip compression flag (1), compression method (1), language tag (until null), translated key (until null)
          let cursor = nullIdx + 1 + 1 + 1;
          while (cursor < data.length && data[cursor] !== 0) cursor++;
          cursor++;
          while (cursor < data.length && data[cursor] !== 0) cursor++;
          cursor++;
          const value = decUtf8.decode(data.slice(cursor));
          chunks[key] = value;
        }
      }

      if (type === 'IEND') break;
      pos += 12 + length;
    }
    return chunks;
  }

  function parseComfyMeta(chunks) {
    if (!chunks) return null;
    const keys = ['workflow', 'prompt', 'parameters', 'Comment'];
    const found = {};
    for (const k of keys) {
      if (chunks[k]) found[k] = chunks[k];
    }
    if (Object.keys(found).length === 0) return null;
    return found;
  }

  function extractPositiveNegative(promptObj) {
    const result = { positive: [], negative: [], model: null, steps: null, cfg: null, sampler: null, scheduler: null, seed: null };
    if (!promptObj || typeof promptObj !== 'object') return result;

    // Build a downstream map: nodeId -> list of nodeIds that consume its output
    // This lets us trace which CLIPTextEncode (or text node) eventually feeds into KSampler positive vs negative
    const downstreamOf = {}; // nodeId -> [{toId, inputKey}]
    for (const [toId, node] of Object.entries(promptObj)) {
      for (const [key, val] of Object.entries(node.inputs || {})) {
        if (Array.isArray(val) && val.length === 2 && typeof val[0] === 'number') {
          const fromId = String(val[0]);
          if (!downstreamOf[fromId]) downstreamOf[fromId] = [];
          downstreamOf[fromId].push({ toId, inputKey: key });
        }
      }
    }

    // Walk UPSTREAM from a node, collecting all literal string values found anywhere in the subgraph.
    // Does not filter by class_type — works with any custom node.
    function collectTextsUpstream(nodeId, visited = new Set()) {
      if (visited.has(nodeId)) return [];
      visited.add(nodeId);
      const node = promptObj[nodeId];
      if (!node) return [];
      const texts = [];
      for (const [, val] of Object.entries(node.inputs || {})) {
        if (typeof val === 'string') {
          const t = val.trim();
          // Accept prompt-like strings: has space/comma or >15 chars, and not a pure filename/enum
          if (t.length > 0 && (t.includes(' ') || t.includes(',') || t.length > 15) && !t.endsWith('.safetensors') && !t.endsWith('.gguf') && !t.endsWith('.pt') && !t.endsWith('.pth')) {
            texts.push(t);
          }
        } else if (Array.isArray(val) && val.length === 2 && typeof val[0] === 'number') {
          texts.push(...collectTextsUpstream(String(val[0]), visited));
        }
      }
      return texts;
    }

    function resolveModelName(nodeId, visited = new Set()) {
      if (visited.has(nodeId)) return null;
      visited.add(nodeId);
      const node = promptObj[nodeId];
      if (!node) return null;
      if (node.inputs?.ckpt_name) return node.inputs.ckpt_name;
      if (node.inputs?.unet_name) return node.inputs.unet_name;
      for (const val of Object.values(node.inputs || {})) {
        if (Array.isArray(val) && val.length === 2 && typeof val[0] === 'number') {
          const found = resolveModelName(String(val[0]), visited);
          if (found) return found;
        }
      }
      return null;
    }

    for (const [, node] of Object.entries(promptObj)) {
      const cls = node.class_type || '';
      if (cls !== 'KSampler' && cls !== 'KSamplerAdvanced') continue;
      const inp = node.inputs || {};

      if (result.steps === null && inp.steps != null) result.steps = inp.steps;
      if (result.cfg === null && inp.cfg != null) result.cfg = inp.cfg;
      if (result.sampler === null && inp.sampler_name != null) result.sampler = inp.sampler_name;
      if (result.scheduler === null && inp.scheduler != null) result.scheduler = inp.scheduler;
      if (result.seed === null) {
        const s = inp.seed != null ? inp.seed : inp.noise_seed;
        if (s != null) result.seed = s;
      }
      if (result.model === null && Array.isArray(inp.model)) {
        result.model = resolveModelName(String(inp.model[0]));
      }

      if (Array.isArray(inp.positive)) {
        for (const t of collectTextsUpstream(String(inp.positive[0]))) {
          if (!result.positive.includes(t)) result.positive.push(t);
        }
      }
      if (Array.isArray(inp.negative)) {
        for (const t of collectTextsUpstream(String(inp.negative[0]))) {
          if (!result.negative.includes(t)) result.negative.push(t);
        }
      }
    }

    // Fallback: collect ALL prompt-like strings from entire graph, skip known non-prompt fields
    if (result.positive.length === 0) {
      const skipKeys = new Set(['model_name','ckpt_name','unet_name','vae_name','clip_name','lora_name','lora_name_1','lora_name_2','lora_name_3','sampler_name','scheduler','upscale_method','blend_mode','device_mode','chat_handler','mode','file','wildcard','option','weight_dtype','type','device','sam_detection_hint','sam_mask_hint_use_negative']);
      const seen = new Set();
      for (const node of Object.values(promptObj)) {
        for (const [k, val] of Object.entries(node.inputs || {})) {
          if (skipKeys.has(k)) continue;
          if (typeof val === 'string') {
            const t = val.trim();
            if (t.length > 15 && !t.endsWith('.safetensors') && !t.endsWith('.gguf') && !t.endsWith('.pt') && !t.endsWith('.pth') && !seen.has(t)) {
              seen.add(t);
              result.positive.push(t);
            }
          }
        }
      }
      // Also check 'value' / 'text' keys on known text-source nodes
      for (const node of Object.values(promptObj)) {
        for (const k of ['text','value','string','prompt']) {
          const val = node.inputs?.[k];
          if (typeof val === 'string') {
            const t = val.trim();
            if (t.length > 15 && !seen.has(t)) {
              seen.add(t);
              result.positive.push(t);
            }
          }
        }
      }
    }

    return result;
  }

  function renderComfyPanel(meta) {
    const panel = document.getElementById('comfy-panel');
    const body = document.getElementById('comfy-panel-body');
    body.innerHTML = '';

    if (!meta || !comfyPanelOpen) {
      panel.classList.remove('visible');
      return;
    }

    if (meta.prompt) {
      try {
        const promptObj = JSON.parse(meta.prompt);
        const info = extractPositiveNegative(promptObj);
        console.log('[ComfyUI] positive:', info.positive);
        console.log('[ComfyUI] chips:', {model:info.model,steps:info.steps,cfg:info.cfg,sampler:info.sampler,seed:info.seed});

        if (info.positive.length > 0) {
          body.appendChild(makeSection('Positive Prompt', info.positive.join('\n\n---\n\n')));
        }
const chips = [];
        if (info.model) chips.push(['Model', info.model]);
        if (info.steps != null) chips.push(['Steps', info.steps]);
        if (info.cfg != null) chips.push(['CFG', info.cfg]);
        if (info.sampler) chips.push(['Sampler', info.sampler]);
        if (info.scheduler) chips.push(['Scheduler', info.scheduler]);
        if (info.seed != null) chips.push(['Seed', info.seed]);

        if (chips.length > 0) {
          body.appendChild(makeChipSection('Generation Info', chips));
        }

        if (info.positive.length === 0 && chips.length === 0) {
          body.appendChild(makeSection('Prompt (raw)', JSON.stringify(promptObj, null, 2)));
        }
      } catch (_) {
        body.appendChild(makeSection('Prompt', meta.prompt));
      }
    }

    if (meta.parameters) {
      const parsed = parseA1111Params(meta.parameters);
      if (parsed) {
        if (parsed.positive) body.appendChild(makeSection('Positive Prompt', parsed.positive));
        const chips = [];
        for (const [k, v] of Object.entries(parsed.settings || {})) chips.push([k, v]);
        if (chips.length > 0) body.appendChild(makeChipSection('Generation Info', chips));
      } else {
        body.appendChild(makeSection('Parameters', meta.parameters));
      }
    }

    if (meta.Comment && !meta.prompt && !meta.parameters) {
      body.appendChild(makeSection('Comment', meta.Comment));
    }

    if (body.children.length > 0) panel.classList.add('visible');
    else panel.classList.remove('visible');
  }

  function parseA1111Params(text) {
    // Format: positive\nNegative prompt: negative\nSteps: x, ...
    const negIdx = text.search(/\bNegative prompt:/i);
    const settingsIdx = text.search(/\nSteps:/i);
    if (negIdx === -1 && settingsIdx === -1) return null;

    const result = { positive: '', negative: '', settings: {} };
    if (negIdx !== -1) {
      result.positive = text.slice(0, negIdx).trim();
      const afterNeg = text.slice(negIdx + 'Negative prompt:'.length);
      const endNeg = afterNeg.search(/\nSteps:/i);
      result.negative = endNeg !== -1 ? afterNeg.slice(0, endNeg).trim() : afterNeg.trim();
    } else {
      result.positive = text.slice(0, settingsIdx).trim();
    }

    const settingsStart = settingsIdx !== -1 ? settingsIdx : -1;
    if (settingsStart !== -1) {
      const settingsStr = text.slice(settingsStart).replace(/^\n/, '');
      settingsStr.split(',').forEach(part => {
        const colonIdx = part.indexOf(':');
        if (colonIdx !== -1) {
          const k = part.slice(0, colonIdx).trim();
          const v = part.slice(colonIdx + 1).trim();
          if (k) result.settings[k] = v;
        }
      });
    }
    return result;
  }

  function makeSection(label, text) {
    const div = document.createElement('div');
    div.className = 'comfy-section';
    div.innerHTML = `<div class="comfy-label">${escHtml(label)}</div><div class="comfy-value">${escHtml(text)}</div>`;
    return div;
  }

  function makeChipSection(label, pairs) {
    const div = document.createElement('div');
    div.className = 'comfy-section';
    const row = document.createElement('div');
    row.className = 'comfy-row';
    for (const [k, v] of pairs) {
      const chip = document.createElement('span');
      chip.className = 'comfy-chip';
      chip.innerHTML = `<span class="comfy-chip-key">${escHtml(String(k))}:</span> ${escHtml(String(v))}`;
      row.appendChild(chip);
    }
    div.innerHTML = `<div class="comfy-label">${escHtml(label)}</div>`;
    div.appendChild(row);
    return div;
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  let comfyPanelOpen = true;

  function toggleComfyPanel() {
    comfyPanelOpen = !comfyPanelOpen;
    const file = filteredFiles()[lbIndex];
    renderComfyPanel(file?.comfyMeta ?? null);
  }

  let allFiles = [];
  let currentFilter = 'all';
  let lbIndex = -1;

  function getExt(name) { return name.split('.').pop().toLowerCase(); }
  function isImage(name) { return IMAGE_EXTS.has(getExt(name)); }
  function isVideo(name) { return VIDEO_EXTS.has(getExt(name)); }

  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  }

  function filteredFiles() {
    return currentFilter === 'all' ? allFiles : allFiles.filter(f => f.type === currentFilter);
  }

  // Drop zone
  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    const files = [...e.dataTransfer.files].filter(f => f.name.toLowerCase().endsWith('.zip'));
    if (files.length) processZips(files);
  });
  fileInput.addEventListener('change', e => {
    const files = [...e.target.files].filter(f => f.name.toLowerCase().endsWith('.zip'));
    if (files.length) processZips(files);
    e.target.value = '';
  });

  // Global drag-and-drop onto gallery area
  document.addEventListener('dragover', e => {
    if (e.target.closest('#lightbox')) return;
    e.preventDefault();
  });
  document.addEventListener('drop', e => {
    if (e.target.closest('#lightbox')) return;
    if (e.target.closest('#drop-zone')) return;
    e.preventDefault();
    const files = [...e.dataTransfer.files].filter(f => f.name.toLowerCase().endsWith('.zip'));
    if (files.length) processZips(files);
  });

  // Lightbox drag-and-drop (append to existing gallery)
  const lightbox = document.getElementById('lightbox');
  const lbDropOverlay = document.getElementById('lb-drop-overlay');
  let lbDragCounter = 0;

  lightbox.addEventListener('dragenter', e => {
    e.preventDefault();
    lbDragCounter++;
    lbDropOverlay.classList.add('active');
  });
  lightbox.addEventListener('dragleave', e => {
    lbDragCounter--;
    if (lbDragCounter <= 0) { lbDragCounter = 0; lbDropOverlay.classList.remove('active'); }
  });
  lightbox.addEventListener('dragover', e => e.preventDefault());
  lightbox.addEventListener('drop', e => {
    e.preventDefault();
    lbDragCounter = 0;
    lbDropOverlay.classList.remove('active');
    const files = [...e.dataTransfer.files].filter(f => f.name.toLowerCase().endsWith('.zip'));
    if (files.length) appendZips(files);
  });

  function setLoading(text) {
    document.getElementById('loading-text').textContent = text || 'Analyzing ZIP file...';
    document.getElementById('loading').classList.add('visible');
    document.getElementById('drop-zone').style.display = 'none';
    document.getElementById('gallery').innerHTML = '';
    document.getElementById('stats-bar').classList.remove('visible');
    document.getElementById('filter-bar').classList.remove('visible');
    document.getElementById('download-all-btn').classList.remove('visible');
    document.getElementById('error-msg').classList.remove('visible');
  }

  function hideLoading() { document.getElementById('loading').classList.remove('visible'); }

  function showError(msg) {
    hideLoading();
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.classList.add('visible');
    document.getElementById('drop-zone').style.display = 'flex';
  }

  function goHome() {
    allFiles.forEach(f => URL.revokeObjectURL(f.url));
    allFiles = [];
    currentFilter = 'all';
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === 'all'));
    document.getElementById('gallery').innerHTML = '';
    document.getElementById('stats-bar').classList.remove('visible');
    document.getElementById('filter-bar').classList.remove('visible');
    document.getElementById('download-all-btn').classList.remove('visible');
    document.getElementById('decode-all-btn').classList.remove('visible');
    document.getElementById('decode-progress').classList.remove('visible');
    document.getElementById('error-msg').classList.remove('visible');
    document.getElementById('home-btn').classList.remove('visible');
    document.getElementById('drop-zone').style.display = 'flex';
  }

  async function extractZipFiles(file) {
    const zip = await JSZip.loadAsync(file);
    const entries = [];
    zip.forEach((path, entry) => {
      if (entry.dir) return;
      const name = path.split('/').pop();
      if (isImage(name) || isVideo(name)) entries.push({ entry, name });
    });
    const result = [];
    for (let i = 0; i < entries.length; i++) {
      const { entry, name } = entries[i];
      document.getElementById('loading-text').textContent =
        `Processing: ${file.name} (${i + 1} / ${entries.length})`;
      const blob = await entry.async('blob');
      const mimeBlob = fixMime(blob, name);
      const url = URL.createObjectURL(mimeBlob);
      const fileType = isImage(name) ? 'image' : 'video';
      let comfyMeta = null;
      if (fileType === 'image' && getExt(name) === 'png') {
        const chunks = await extractPngTextChunks(blob);
        comfyMeta = parseComfyMeta(chunks);
      }
      result.push({ name, type: fileType, blob: mimeBlob, url, size: blob.size, comfyMeta });
    }
    return result;
  }

  async function processZips(files) {
    setLoading('Opening ZIP files...');
    allFiles.forEach(f => URL.revokeObjectURL(f.url));
    allFiles = [];
    let totalLoaded = 0;
    for (const file of files) {
      try {
        const extracted = await extractZipFiles(file);
        allFiles.push(...extracted);
        totalLoaded += extracted.length;
      } catch (err) {
        console.warn(`${file.name} error:`, err);
      }
    }
    if (allFiles.length === 0) { showError('No supported image or video files found in the ZIP.'); return; }
    hideLoading();
    renderStats(files.length);
    renderGallery();
    document.getElementById('home-btn').classList.add('visible');
    snailScanAll();
  }

  async function appendZips(files) {
    const prevLength = allFiles.length;
    document.getElementById('loading-text').textContent = 'Adding ZIPs...';
    document.getElementById('loading').classList.add('visible');
    for (const file of files) {
      try {
        const extracted = await extractZipFiles(file);
        allFiles.push(...extracted);
      } catch (err) {
        console.warn(`${file.name} error:`, err);
      }
    }
    document.getElementById('loading').classList.remove('visible');
    if (allFiles.length === prevLength) return;
    renderStats(null);
    renderGallery();
    // Navigate lightbox to first newly added file
    lbIndex = filteredFiles().length - (allFiles.length - prevLength);
    renderLightboxItem();
    snailScanAll();
  }

  function fixMime(blob, name) {
    const ext = getExt(name);
    const mimeMap = {
      jpg:'image/jpeg',jpeg:'image/jpeg',png:'image/png',gif:'image/gif',
      webp:'image/webp',bmp:'image/bmp',svg:'image/svg+xml',avif:'image/avif',
      tiff:'image/tiff',tif:'image/tiff',ico:'image/x-icon',
      mp4:'video/mp4',webm:'video/webm',ogg:'video/ogg',mov:'video/quicktime',
      mkv:'video/x-matroska',avi:'video/x-msvideo',m4v:'video/mp4',
      '3gp':'video/3gpp',flv:'video/x-flv',
    };
    const mime = mimeMap[ext];
    return mime ? blob.slice(0, blob.size, mime) : blob;
  }

  function renderStats(zipCount) {
    if (zipCount !== null) {
      document.getElementById('stat-zip-name').textContent = zipCount === 1 ? '1 ZIP' : zipCount + ' ZIPs';
    }
    document.getElementById('stat-images').textContent = allFiles.filter(f => f.type === 'image').length;
    document.getElementById('stat-videos').textContent = allFiles.filter(f => f.type === 'video').length;
    document.getElementById('stat-size').textContent = formatSize(allFiles.reduce((s, f) => s + f.size, 0));
    document.getElementById('stats-bar').classList.add('visible');
    document.getElementById('filter-bar').classList.add('visible');
    document.getElementById('download-all-btn').classList.add('visible');
    document.getElementById('drop-zone').style.display = 'none';
    // decode-all shown after scan finds at least one snail (updated by snailScanAll)
  }

  function renderGallery() {
    const gallery = document.getElementById('gallery');
    gallery.innerHTML = '';
    const files = filteredFiles();

    files.forEach((file, idx) => {
      const card = document.createElement('div');
      card.className = 'media-card';
      card.dataset.type = file.type;

      let mediaEl;
      if (file.type === 'image') {
        mediaEl = document.createElement('img');
        mediaEl.src = file.url;
        mediaEl.alt = file.name;
        mediaEl.loading = 'lazy';
      } else {
        mediaEl = document.createElement('video');
        mediaEl.src = file.url;
        mediaEl.controls = true;
        mediaEl.preload = 'metadata';
      }
      mediaEl.className = 'thumb';
      mediaEl.onclick = () => openLightbox(idx);

      const footer = document.createElement('div');
      footer.className = 'card-footer';

      const nameEl = document.createElement('div');
      nameEl.className = 'file-name';
      nameEl.title = file.name;
      nameEl.textContent = file.name;

      const dlBtn = document.createElement('button');
      dlBtn.className = 'dl-btn';
      dlBtn.title = 'Download';
      dlBtn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`;
      dlBtn.onclick = e => { e.stopPropagation(); downloadFile(file); };

      if (file.snailDetected) {
        const badge = document.createElement('div');
        badge.className = 'snail-badge';
        badge.textContent = '🐌';
        card.appendChild(badge);
      }
      footer.appendChild(nameEl);
      footer.appendChild(dlBtn);
      card.appendChild(mediaEl);
      card.appendChild(footer);
      gallery.appendChild(card);
    });
  }

  function applyFilter(btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderGallery();
  }

  function downloadFile(file) {
    const a = document.createElement('a');
    a.href = file.url;
    a.download = file.name;
    a.click();
  }

  async function downloadAll() {
    const btn = document.getElementById('download-all-btn');
    btn.disabled = true;
    btn.textContent = 'Compressing...';
    try {
      const zip = new JSZip();
      allFiles.forEach(f => zip.file(f.name, f.blob));
      const blob = await zip.generateAsync({ type: 'blob', compression: 'STORE' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'media_files.zip';
      a.click();
      URL.revokeObjectURL(url);
    } finally {
      btn.disabled = false;
      btn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download All`;
    }
  }

  // Lightbox
  function openLightbox(idx) {
    lbIndex = idx;
    renderLightboxItem();
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function renderLightboxItem() {
    const files = filteredFiles();
    const file = files[lbIndex];
    if (!file) return;

    const content = document.getElementById('lightbox-content');
    const prevVideo = content.querySelector('video');
    if (prevVideo) prevVideo.pause();
    content.innerHTML = '';

    let el;
    if (file.type === 'image') {
      el = document.createElement('img');
      el.src = file.url;
      el.alt = file.name;
    } else {
      el = document.createElement('video');
      el.src = file.url;
      el.controls = true;
      el.autoplay = true;
    }
    content.appendChild(el);

    document.getElementById('lightbox-name').textContent = file.name;
    document.getElementById('lightbox-counter').textContent = `${lbIndex + 1} / ${files.length}`;

    // ComfyUI metadata
    const toggleBtn = document.getElementById('comfy-toggle');
    if (file.comfyMeta) {
      toggleBtn.classList.add('visible');
      renderComfyPanel(file.comfyMeta);
    } else {
      toggleBtn.classList.remove('visible');
      document.getElementById('comfy-panel').classList.remove('visible');
      document.getElementById('comfy-panel-body').innerHTML = '';
    }

    // Auto-open snail panel if this image has hidden data
    if (file.snailDetected) {
      snailAutoDecodeFile(file);
    } else {
      resetSnailPanel();
      snailPanelOpen = false;
      document.getElementById('snail-panel').classList.remove('visible');
    }
  }

  function lbNavigate(dir) {
    const files = filteredFiles();
    lbIndex = (lbIndex + dir + files.length) % files.length;
    renderLightboxItem();
  }

  function lbSaveCurrent() {
    const file = filteredFiles()[lbIndex];
    if (file) downloadFile(file);
  }

  function closeLightbox() {
    const video = document.querySelector('#lightbox-content video');
    if (video) video.pause();
    document.getElementById('lightbox').classList.remove('open');
    document.getElementById('lightbox-content').innerHTML = '';
    document.getElementById('comfy-panel').classList.remove('visible');
    document.getElementById('comfy-panel-body').innerHTML = '';
    document.getElementById('snail-panel').classList.remove('visible');
    document.body.style.overflow = '';
    lbIndex = -1;
    comfyPanelOpen = true;
    snailPanelOpen = false;
    resetSnailPanel();
  }

  function onLightboxBgClick(e) {
    if (e.target === document.getElementById('lightbox')) closeLightbox();
  }

  document.addEventListener('keydown', e => {
    if (!document.getElementById('lightbox').classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') lbNavigate(-1);
    if (e.key === 'ArrowRight') lbNavigate(1);
  });

  document.addEventListener('wheel', e => {
    if (!document.getElementById('lightbox').classList.contains('open')) return;
    if (e.target.closest('#comfy-panel')) return;
    if (e.target.closest('#snail-panel')) return;
    e.preventDefault();
    lbNavigate(e.deltaY > 0 ? 1 : -1);
  }, { passive: false });

  // --- SnailShell LSB Steganography Decoder ---

  const SNAIL_MAGIC = [0x53, 0x4E, 0x41, 0x49, 0x4C]; // "SNAIL"
  const SNAIL_SKIP_W_RATIO = 0.40;
  const SNAIL_SKIP_H_RATIO = 0.08;

  let snailPanelOpen = false;
  let snailExtractedBlob = null;
  let snailExtractedExt = null;
  let snailResultObjectUrl = null;
  let snailPendingHeaderBytes = null; // for password-protected images

  function toggleSnailPanel() {
    snailPanelOpen = !snailPanelOpen;
    document.getElementById('snail-panel').classList.toggle('visible', snailPanelOpen);
  }

  function resetSnailPanel() {
    document.getElementById('snail-status').textContent = '';
    document.getElementById('snail-status').className = '';
    document.getElementById('snail-result').classList.remove('visible');
    document.getElementById('snail-result-media').innerHTML = '';
    document.getElementById('snail-pw-section').style.display = 'none';
    document.getElementById('snail-pw-input').value = '';
    if (snailResultObjectUrl) { URL.revokeObjectURL(snailResultObjectUrl); snailResultObjectUrl = null; }
    snailExtractedBlob = null;
    snailExtractedExt = null;
    snailPendingHeaderBytes = null;
  }

  function setSnailStatus(msg, type) {
    const el = document.getElementById('snail-status');
    el.textContent = msg;
    el.className = type || '';
  }

  async function imageBlobToPixels(blob) {
    const bmp = await createImageBitmap(blob);
    const canvas = new OffscreenCanvas(bmp.width, bmp.height);
    const ctx = canvas.getContext('2d');
    ctx.drawImage(bmp, 0, 0);
    bmp.close();
    return ctx.getImageData(0, 0, canvas.width, canvas.height);
  }

  function snailExtractLsb(imageData) {
    const { data, width: w, height: h } = imageData;
    const bitMode = data[0] & 0x3;
    const lsbBits = [2, 4, 8][bitMode] ?? 4;
    const skipW = Math.floor(w * SNAIL_SKIP_W_RATIO);
    const skipH = Math.floor(h * SNAIL_SKIP_H_RATIO);
    const divisor = 1 << lsbBits;
    const mask = divisor - 1;

    const vals = [];
    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        for (let c = 0; c < 3; c++) {
          if (y < skipH && x < skipW) continue;
          if (y === 0 && x === 0 && c === 0) continue;
          vals.push(data[(y * w + x) * 4 + c] & mask);
        }
      }
    }

    const bits = [];
    for (const v of vals) {
      for (let b = lsbBits - 1; b >= 0; b--) bits.push((v >> b) & 1);
    }

    function readBits(start, count) {
      let val = 0;
      for (let i = 0; i < count; i++) val = (val << 1) | (bits[start + i] ?? 0);
      return val >>> 0;
    }
    function bitsToBytes(start, byteCount) {
      const out = new Uint8Array(byteCount);
      for (let i = 0; i < byteCount; i++) out[i] = readBits(start + i * 8, 8);
      return out;
    }

    const headerLen = readBits(0, 32);
    if (headerLen === 0 || headerLen > 200 * 1024 * 1024) return null;
    return bitsToBytes(32, headerLen);
  }

  // Returns { data, ext } on success, throws on magic mismatch or wrong password.
  // Throws a special error with .needsPassword=true if password required but not given.
  async function snailParseHeader(headerBytes, password) {
    let idx = 0;
    for (let i = 0; i < 5; i++) {
      if (headerBytes[idx++] !== SNAIL_MAGIC[i]) throw new Error('Not a SnailShell image');
    }
    const hasPwd = headerBytes[idx++] === 1;
    let salt = null;
    if (hasPwd) {
      const pwdHash = headerBytes.slice(idx, idx + 32); idx += 32;
      salt = headerBytes.slice(idx, idx + 16); idx += 16;
      if (!password) {
        const err = new Error('Password required');
        err.needsPassword = true;
        throw err;
      }
      const saltHex = Array.from(salt).map(b => b.toString(16).padStart(2, '0')).join('');
      const digest = new Uint8Array(await crypto.subtle.digest('SHA-256', new TextEncoder().encode(password + saltHex)));
      if (!digest.every((b, i) => b === pwdHash[i])) throw new Error('Wrong password');
    }
    const extLen = headerBytes[idx++];
    const ext = new TextDecoder().decode(headerBytes.slice(idx, idx + extLen)); idx += extLen;
    const dataLen = ((headerBytes[idx] << 24) | (headerBytes[idx+1] << 16) | (headerBytes[idx+2] << 8) | headerBytes[idx+3]) >>> 0; idx += 4;
    let payload = headerBytes.slice(idx, idx + dataLen);
    if (hasPwd) payload = await snailDecrypt(payload, password, salt);
    return { data: payload, ext };
  }

  async function snailDecrypt(data, password, salt) {
    const saltHex = Array.from(salt).map(b => b.toString(16).padStart(2, '0')).join('');
    const out = new Uint8Array(data.length);
    let counter = 0, offset = 0;
    while (offset < data.length) {
      const digest = new Uint8Array(await crypto.subtle.digest('SHA-256', new TextEncoder().encode(password + saltHex + String(counter))));
      for (let i = 0; i < digest.length && offset < data.length; i++, offset++) out[offset] = data[offset] ^ digest[i];
      counter++;
    }
    return out;
  }

  function snailShowResult(data, ext) {
    snailExtractedExt = ext;
    const mimeType = ext === 'png' ? 'image/png' : ext === 'mp4' ? 'video/mp4' : 'application/octet-stream';
    snailExtractedBlob = new Blob([data], { type: mimeType });
    if (snailResultObjectUrl) URL.revokeObjectURL(snailResultObjectUrl);
    snailResultObjectUrl = URL.createObjectURL(snailExtractedBlob);

    const mediaContainer = document.getElementById('snail-result-media');
    mediaContainer.innerHTML = '';
    if (ext === 'png') {
      const img = document.createElement('img');
      img.src = snailResultObjectUrl;
      mediaContainer.appendChild(img);
    } else if (ext === 'mp4') {
      const video = document.createElement('video');
      video.src = snailResultObjectUrl;
      video.controls = true;
      video.style.width = '100%';
      mediaContainer.appendChild(video);
    } else {
      mediaContainer.textContent = `Unknown format: ${ext}`;
    }
    document.getElementById('snail-result').classList.add('visible');
    setSnailStatus(`${ext.toUpperCase()} · ${formatSize(data.length)}`, 'ok');
  }

  // Called automatically when a snail image is opened in the lightbox
  async function snailAutoDecodeFile(file) {
    resetSnailPanel();
    snailPanelOpen = true;
    document.getElementById('snail-panel').classList.add('visible');
    setSnailStatus('Decoding…', '');

    try {
      // Use cached raw pixel data if available, else decode from blob
      let headerBytes = file.snailHeaderBytes;
      if (!headerBytes) {
        const imageData = await imageBlobToPixels(file.blob);
        headerBytes = snailExtractLsb(imageData);
        file.snailHeaderBytes = headerBytes; // cache
      }
      if (!headerBytes) throw new Error('No hidden data found.');

      const { data, ext } = await snailParseHeader(headerBytes, '');
      snailShowResult(data, ext);
    } catch (err) {
      if (err.needsPassword) {
        snailPendingHeaderBytes = file.snailHeaderBytes;
        setSnailStatus('Password protected', '');
        document.getElementById('snail-pw-section').style.display = 'block';
        document.getElementById('snail-pw-input').focus();
      } else {
        setSnailStatus(err.message, 'error');
        snailPanelOpen = false;
        document.getElementById('snail-panel').classList.remove('visible');
      }
    }
  }

  async function snailDecodeWithPassword() {
    const password = document.getElementById('snail-pw-input').value;
    if (!password) return;
    const btn = document.getElementById('snail-decode-btn');
    btn.disabled = true;
    setSnailStatus('Unlocking…', '');
    try {
      const file = filteredFiles()[lbIndex];
      const headerBytes = snailPendingHeaderBytes ?? file?.snailHeaderBytes;
      if (!headerBytes) throw new Error('No data to decode.');
      const { data, ext } = await snailParseHeader(headerBytes, password);
      document.getElementById('snail-pw-section').style.display = 'none';
      snailShowResult(data, ext);
    } catch (err) {
      setSnailStatus(err.message, 'error');
    } finally {
      btn.disabled = false;
    }
  }

  function snailSave() {
    if (!snailExtractedBlob) return;
    const file = filteredFiles()[lbIndex];
    const baseName = file ? file.name.replace(/\.[^.]+$/, '') : 'snail_extracted';
    const a = document.createElement('a');
    a.href = snailResultObjectUrl;
    a.download = `${baseName}_snail.${snailExtractedExt}`;
    a.click();
  }

  // Background snail detection after gallery loads — checks each PNG image
  async function snailScanAll() {
    for (let i = 0; i < allFiles.length; i++) {
      const file = allFiles[i];
      if (file.type !== 'image' || getExt(file.name) !== 'png') continue;
      if (file.snailDetected !== undefined) continue;
      try {
        const imageData = await imageBlobToPixels(file.blob);
        const headerBytes = snailExtractLsb(imageData);
        if (!headerBytes) { file.snailDetected = false; continue; }
        const magic = headerBytes.slice(0, 5);
        const isSnail = SNAIL_MAGIC.every((b, j) => b === magic[j]);
        file.snailDetected = isSnail;
        if (isSnail) {
          file.snailHeaderBytes = headerBytes;
          updateSnailBadge(i);
        }
      } catch (_) { file.snailDetected = false; }
    }
    // Show decode-all button if any snails found
    const hasSnail = allFiles.some(f => f.snailDetected);
    document.getElementById('decode-all-btn').classList.toggle('visible', hasSnail);
  }

  async function decodeAll() {
    const snailFiles = allFiles.filter(f => f.snailDetected && f.snailHeaderBytes);
    if (!snailFiles.length) return;

    const btn = document.getElementById('decode-all-btn');
    btn.disabled = true;
    const progress = document.getElementById('decode-progress');
    const progressText = document.getElementById('decode-progress-text');
    const progressBar = document.getElementById('decode-progress-bar');
    progress.classList.add('visible');

    const decoded = [];
    for (let i = 0; i < snailFiles.length; i++) {
      const file = snailFiles[i];
      progressText.textContent = `Decoding ${i + 1} / ${snailFiles.length}…`;
      progressBar.style.width = `${Math.round((i / snailFiles.length) * 100)}%`;
      try {
        const { data, ext } = await snailParseHeader(file.snailHeaderBytes, '');
        const mimeType = ext === 'png' ? 'image/png' : ext === 'mp4' ? 'video/mp4' : 'application/octet-stream';
        const blob = new Blob([data], { type: mimeType });
        const url = URL.createObjectURL(blob);
        const baseName = file.name.replace(/\.[^.]+$/, '');
        decoded.push({ name: `${baseName}_snail.${ext}`, blob, url, type: ext === 'mp4' ? 'video' : 'image', size: data.length, comfyMeta: null, snailDetected: false });
      } catch (err) {
        if (err.needsPassword) {
          progressText.textContent = `Skipped (password protected): ${file.name}`;
          await new Promise(r => setTimeout(r, 600));
        }
      }
    }

    progressBar.style.width = '100%';
    progressText.textContent = `Done — ${decoded.length} image${decoded.length !== 1 ? 's' : ''} decoded`;

    if (decoded.length === 0) {
      setTimeout(() => progress.classList.remove('visible'), 2000);
      btn.disabled = false;
      return;
    }

    // Replace gallery with decoded images
    allFiles.forEach(f => URL.revokeObjectURL(f.url));
    allFiles = decoded;
    currentFilter = 'all';
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === 'all'));
    document.getElementById('stat-zip-name').textContent = 'Decoded';
    document.getElementById('stat-images').textContent = allFiles.filter(f => f.type === 'image').length;
    document.getElementById('stat-videos').textContent = allFiles.filter(f => f.type === 'video').length;
    document.getElementById('stat-size').textContent = formatSize(allFiles.reduce((s, f) => s + f.size, 0));
    renderGallery();

    btn.classList.remove('visible');
    setTimeout(() => progress.classList.remove('visible'), 1500);
    btn.disabled = false;
  }

  function updateSnailBadge(allFileIdx) {
    // Find the card in the gallery matching this allFiles index
    const files = filteredFiles();
    const filteredIdx = files.indexOf(allFiles[allFileIdx]);
    if (filteredIdx === -1) return;
    const cards = document.querySelectorAll('#gallery .media-card');
    const card = cards[filteredIdx];
    if (!card || card.querySelector('.snail-badge')) return;
    const badge = document.createElement('div');
    badge.className = 'snail-badge';
    badge.textContent = '🐌';
    card.appendChild(badge);
  }
</script>
</body>
